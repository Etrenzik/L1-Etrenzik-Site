# L1-ETRENZIK Litigation Workspace — Docker Compose
# DRAFT WORK PRODUCT — NOT LEGAL ADVICE

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: l1-etrenzik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: l1_etrenzik
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: l1-etrenzik-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: l1-etrenzik-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/l1_etrenzik?schema=public"
      REDIS_URL: "redis://redis:6379"
      API_PORT: "4000"
      API_HOST: "0.0.0.0"
      API_CORS_ORIGIN: "http://localhost:3000"
      LOG_LEVEL: "info"
      AUDIT_LOG_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: l1-etrenzik-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/l1_etrenzik?schema=public"
      REDIS_URL: "redis://redis:6379"
      WORKER_CONCURRENCY: "5"
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redis-data:
